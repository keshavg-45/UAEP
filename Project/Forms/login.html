<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="login.css">
    <title>Login Page </title>
 



</head>

<body>

    <div class="container">
        <p></p>
        <h1>Login Page</h1>

        <form action="">
            <div class="form-item">
                <input type="email" name="email" id="email" placeholder="Email ID">
            </div>

            <div class="form-item">
                <!-- add a password format display -->
                <span class="pwd-format">
                    8-15 AlphaNumeric Characters
                </span>
                <input type="password" name="password" id="password" placeholder="Enter password">
                
            </div>

            <div class="form-btns">
                <button class="login" type="submit" disabled>Login</button>
                <p></p>
                <div class="options">
                    Don't remember Password? <a href="#">Click here</a>
                    <br/><br/>
                    Don't have Account? <a href="#">Click here</a>
                </div>
            </div>

        </form>
    </div>
  

    

</body>

</html>
