<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="new_password.css">
    <title>Login Page </title>
 



</head>

<body>

    <div class="container">
        <p></p>
        <h1>NEW PASSWORD</h1>

        <form action="">
            <div class="form-item">
                <!-- add a password format display -->
                <span class="pwd-format">
                    8-15 AlphaNumeric Characters
                </span>
                <input type="password" name="new_password" id="new_password" placeholder="Enter password">
                
            </div>  

            <div class="form-item">
                <!-- add a password format display -->
                <span class="pwd-format">
                    8-15 AlphaNumeric Characters
                </span>
                <input type="password" name="new_password1" id="new_password1" placeholder="Re-Enter password">
                
            </div>

            <div class="form-btns">
                <button class="new_pwd" type="submit" disabled>Submit</button>
            </div>
            <div class="form-btns">
                <button class="back" type="submit" disabled>Back</button>
                <p></p>
            </div>

        </form>
    </div>
  

    

</body>

</html>
