<html>
<head>
<link rel="stylesheet" href="css2.css">
</head>
<body>
<div class="container">
  <div class="left">
    <div class="header">
      <h2 class="animation a1">Welcome To UAEP</h2>
      <h4 class="animation a2">Enter the necessary details for accurate university admit eligibility predictions</h4>
       </div>
        <label for="gre">GRE SCORE </label>
        <input type="number"   id="gre" name="gre" required><br><br>
        <label for="ielts">TOEFL/IELTS SCORE </label>
        <input type="number"   id="ielts" name="ielts" required><br><br>
        <label for="sop">SOP </label>
        <input type="number"   id="sop" name="sop" required><br><br>
        <label for="lor">LOR </label>
        <input type="number"   id="lor" name="lor" required><br><br>
        <label for="cgpa">CGPA </label>
        <input type="number"   id="cgpa" name="cgpa" required><br><br>
        <label for="research">RESEARCH PAPER </label><br>
        <input type="number" id="research paper" name="research paper" required><br><br>
        <label for="university rank">UNIVERSITY RANK </label><br>
        <input type="number" id="university rank" name="university rank" required maxlength='5'>
             
  </div>
  <div class="right"></div>
</div>
 <button class="animation a6">Predict</button>
</body>
</html>
